<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="調査記録">
<meta name="theme-color" content="#1b2433">
<title>調査記録 v0.1</title>
<style>
  :root{
    --ink:#1b2433;
    --ink-soft:#3a4760;
    --bg:#f4f3ee;
    --card:#ffffff;
    --line:#e3e1d6;
    --accent:#c8632b;
    --accent-press:#a84f1e;
    --muted:#8a8778;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  .app{min-height:100%;display:flex;flex-direction:column;}

  /* ---- header ---- */
  header{
    position:sticky;top:0;z-index:10;
    background:var(--ink);
    color:#fff;
    padding:calc(var(--safe-top) + 14px) 18px 14px;
    display:flex;align-items:center;gap:12px;
    box-shadow:0 1px 0 rgba(0,0,0,.15);
  }
  header .title{
    font-size:18px;font-weight:700;letter-spacing:.04em;
    flex:1;display:flex;align-items:baseline;gap:8px;
  }
  header .title small{font-size:11px;font-weight:500;color:#9aa6bd;letter-spacing:.1em;}
  .iconbtn{
    background:none;border:none;color:#fff;font-size:15px;font-weight:600;
    padding:8px 4px;cursor:pointer;display:flex;align-items:center;gap:6px;
  }
  .iconbtn:active{opacity:.55;}

  /* ---- screens ---- */
  .screen{flex:1;display:none;flex-direction:column;}
  .screen.active{display:flex;}
  main{flex:1;padding:16px 14px calc(var(--safe-bottom) + 120px);}

  /* ---- list ---- */
  .empty{
    text-align:center;color:var(--muted);
    padding:64px 24px;line-height:1.9;font-size:15px;
  }
  .empty .big{font-size:44px;margin-bottom:8px;opacity:.5;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .rec{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    overflow:hidden;cursor:pointer;display:flex;flex-direction:column;
    transition:transform .08s ease;
  }
  .rec:active{transform:scale(.97);}
  .rec .thumbwrap{position:relative;width:100%;aspect-ratio:1/1;background:#e9e7dd;}
  .rec .thumbwrap img{width:100%;height:100%;object-fit:cover;display:block;}
  .rec .count{
    position:absolute;right:7px;bottom:7px;
    background:rgba(27,36,51,.82);color:#fff;font-size:11px;font-weight:600;
    padding:3px 8px;border-radius:20px;letter-spacing:.03em;
  }
  .rec .meta{padding:9px 11px;}
  .rec .date{font-size:13px;font-weight:600;color:var(--ink);}
  .rec .time{font-size:12px;color:var(--muted);margin-top:1px;}

  /* ---- floating add ---- */
  .fab{
    position:fixed;left:50%;transform:translateX(-50%);
    bottom:calc(var(--safe-bottom) + 22px);z-index:20;
    background:var(--accent);color:#fff;border:none;
    font-size:18px;font-weight:700;letter-spacing:.04em;
    padding:18px 0;width:calc(100% - 36px);max-width:440px;
    border-radius:16px;cursor:pointer;
    box-shadow:0 8px 22px rgba(200,99,43,.38);
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .fab:active{background:var(--accent-press);transform:translateX(-50%) scale(.98);}
  .fab .plus{font-size:24px;line-height:1;}

  /* ---- create ---- */
  .create-body{padding:18px 16px calc(var(--safe-bottom) + 140px);}
  .pickzone{
    border:2px dashed var(--line);border-radius:18px;
    background:var(--card);
    padding:44px 20px;text-align:center;cursor:pointer;
    color:var(--ink-soft);
  }
  .pickzone:active{border-color:var(--accent);background:#fffdf9;}
  .pickzone .cam{font-size:46px;margin-bottom:10px;}
  .pickzone .pz-main{font-size:17px;font-weight:700;}
  .pickzone .pz-sub{font-size:13px;color:var(--muted);margin-top:6px;}
  #fileInput{display:none;}

  .previews{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:18px;}
  .pv{position:relative;aspect-ratio:1/1;border-radius:10px;overflow:hidden;background:#e9e7dd;}
  .pv img{width:100%;height:100%;object-fit:cover;display:block;}
  .pv .pv-x{
    position:absolute;top:4px;right:4px;
    width:24px;height:24px;border-radius:50%;
    background:rgba(27,36,51,.78);color:#fff;border:none;
    font-size:15px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .pv .pv-x:active{background:var(--accent);}
  .pickcount{margin-top:16px;font-size:14px;color:var(--ink-soft);text-align:center;font-weight:600;}
  .pickcount.over{color:var(--accent);}

  .bottombar{
    position:fixed;left:0;right:0;bottom:0;z-index:20;
    padding:14px 16px calc(var(--safe-bottom) + 14px);
    background:linear-gradient(to top,var(--bg) 70%,rgba(244,243,238,0));
    display:flex;gap:12px;
  }
  .btn-primary{
    flex:1;background:var(--accent);color:#fff;border:none;
    font-size:17px;font-weight:700;padding:17px;border-radius:14px;cursor:pointer;
    box-shadow:0 6px 16px rgba(200,99,43,.32);
  }
  .btn-primary:disabled{background:#c9c6ba;box-shadow:none;color:#fff;}
  .btn-primary:active:not(:disabled){background:var(--accent-press);}

  /* ---- detail ---- */
  .detail-body{padding:14px 0 calc(var(--safe-bottom) + 30px);}
  .detail-date{padding:4px 18px 16px;color:var(--muted);font-size:14px;font-weight:600;}
  .detail-img{width:100%;display:block;margin-bottom:10px;background:#e9e7dd;}

  .toast{
    position:fixed;left:50%;bottom:calc(var(--safe-bottom) + 100px);
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-size:14px;font-weight:600;
    padding:12px 22px;border-radius:30px;opacity:0;pointer-events:none;
    transition:opacity .25s,transform .25s;z-index:50;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <header>
    <button class="iconbtn" id="backBtn" style="display:none">‹ 戻る</button>
    <div class="title" id="headTitle">調査記録 <small>v0.1</small></div>
  </header>

  <!-- 一覧 -->
  <section class="screen active" id="listScreen">
    <main id="listMain"></main>
    <button class="fab" id="goCreate"><span class="plus">＋</span>記録する</button>
  </section>

  <!-- 作成 -->
  <section class="screen" id="createScreen">
    <main class="create-body">
      <div class="pickzone" id="pickZone">
        <div class="cam">📷</div>
        <div class="pz-main">写真を選ぶ・撮る</div>
        <div class="pz-sub">1〜10枚（売場・POP・メモ など）</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple>
      <div class="previews" id="previews"></div>
      <div class="pickcount" id="pickCount"></div>
    </main>
    <div class="bottombar">
      <button class="btn-primary" id="saveBtn" disabled>保存する</button>
    </div>
  </section>

  <!-- 詳細 -->
  <section class="screen" id="detailScreen">
    <main class="detail-body">
      <div class="detail-date" id="detailDate"></div>
      <div id="detailImgs"></div>
    </main>
  </section>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";

/* ============ IndexedDB ============ */
const DB_NAME = "kyogoten-db";
const STORE = "records";
let _db = null;

function openDB(){
  return new Promise((resolve,reject)=>{
    if(_db) return resolve(_db);
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains(STORE)){
        const os = db.createObjectStore(STORE, {keyPath:"id"});
        os.createIndex("createdAt","createdAt",{unique:false});
      }
    };
    req.onsuccess = e=>{ _db = e.target.result; resolve(_db); };
    req.onerror = e=>reject(e.target.error);
  });
}
async function addRecord(rec){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).add(rec);
    tx.oncomplete = ()=>resolve();
    tx.onerror = e=>reject(e.target.error);
  });
}
async function getAllRecords(){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE,"readonly");
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = ()=>resolve(req.result || []);
    req.onerror = e=>reject(e.target.error);
  });
}
async function getRecord(id){
  const db = await openDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE,"readonly");
    const req = tx.objectStore(STORE).get(id);
    req.onsuccess = ()=>resolve(req.result || null);
    req.onerror = e=>reject(e.target.error);
  });
}

/* ============ utils ============ */
function uuid(){
  if(crypto.randomUUID) return crypto.randomUUID();
  return "id-"+Date.now()+"-"+Math.random().toString(16).slice(2);
}
function fmtDate(ts){
  const d = new Date(ts);
  const w = ["日","月","火","水","木","金","土"][d.getDay()];
  return `${d.getFullYear()}/${(d.getMonth()+1)}/${d.getDate()}(${w})`;
}
function fmtTime(ts){
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
let _toastTimer = null;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>t.classList.remove("show"), 1800);
}

/* オブジェクトURLの後始末用に画面ごとに管理 */
let liveUrls = [];
function objURL(blob){ const u = URL.createObjectURL(blob); liveUrls.push(u); return u; }
function revokeAll(){ liveUrls.forEach(u=>URL.revokeObjectURL(u)); liveUrls = []; }

/* ============ 画面遷移 ============ */
const screens = {
  list: document.getElementById("listScreen"),
  create: document.getElementById("createScreen"),
  detail: document.getElementById("detailScreen"),
};
const backBtn = document.getElementById("backBtn");
const headTitle = document.getElementById("headTitle");

function show(name){
  revokeAll();
  Object.values(screens).forEach(s=>s.classList.remove("active"));
  screens[name].classList.add("active");
  window.scrollTo(0,0);
  if(name==="list"){
    backBtn.style.display="none";
    headTitle.innerHTML='調査記録 <small>v0.1</small>';
    renderList();
  }else if(name==="create"){
    backBtn.style.display="";
    headTitle.textContent="新しい記録";
  }else if(name==="detail"){
    backBtn.style.display="";
    headTitle.textContent="記録";
  }
}

/* ============ 一覧 ============ */
async function renderList(){
  const main = document.getElementById("listMain");
  const recs = await getAllRecords();
  recs.sort((a,b)=>b.createdAt - a.createdAt); // 新しい順
  if(recs.length===0){
    main.innerHTML = `<div class="empty"><div class="big">🗒️</div>まだ記録がありません。<br>下のボタンから最初の記録を残しましょう。</div>`;
    return;
  }
  const grid = document.createElement("div");
  grid.className = "grid";
  for(const r of recs){
    const cell = document.createElement("div");
    cell.className = "rec";
    const thumbUrl = (r.images && r.images[0]) ? objURL(r.images[0]) : "";
    cell.innerHTML = `
      <div class="thumbwrap">
        ${thumbUrl?`<img src="${thumbUrl}" alt="">`:""}
        <span class="count">${r.images?r.images.length:0}枚</span>
      </div>
      <div class="meta">
        <div class="date">${fmtDate(r.createdAt)}</div>
        <div class="time">${fmtTime(r.createdAt)}</div>
      </div>`;
    cell.addEventListener("click", ()=>openDetail(r.id));
    grid.appendChild(cell);
  }
  main.innerHTML = "";
  main.appendChild(grid);
}

/* ============ 作成 ============ */
let pending = []; // 選択中の File/Blob 配列
const fileInput = document.getElementById("fileInput");
const previews = document.getElementById("previews");
const pickCount = document.getElementById("pickCount");
const saveBtn = document.getElementById("saveBtn");
const MAX = 10;

document.getElementById("goCreate").addEventListener("click", ()=>{
  pending = []; renderPreviews(); show("create");
});
document.getElementById("pickZone").addEventListener("click", ()=>fileInput.click());

fileInput.addEventListener("change", e=>{
  const files = Array.from(e.target.files || []);
  for(const f of files){
    if(pending.length >= MAX){ break; }
    pending.push(f);
  }
  if(files.length && pending.length >= MAX){
    toast(`最大${MAX}枚までです`);
  }
  fileInput.value = ""; // 同じ写真を選び直せるように
  renderPreviews();
});

function renderPreviews(){
  revokeAll();
  previews.innerHTML = "";
  pending.forEach((f,i)=>{
    const div = document.createElement("div");
    div.className = "pv";
    const url = objURL(f);
    div.innerHTML = `<img src="${url}" alt=""><button class="pv-x" data-i="${i}">×</button>`;
    previews.appendChild(div);
  });
  previews.querySelectorAll(".pv-x").forEach(btn=>{
    btn.addEventListener("click", ev=>{
      ev.stopPropagation();
      const i = parseInt(btn.dataset.i,10);
      pending.splice(i,1);
      renderPreviews();
    });
  });
  const n = pending.length;
  pickCount.textContent = n ? `${n} / ${MAX} 枚` : "";
  pickCount.classList.toggle("over", n>=MAX);
  saveBtn.disabled = n===0;
}

saveBtn.addEventListener("click", async ()=>{
  if(pending.length===0) return;
  saveBtn.disabled = true;
  saveBtn.textContent = "保存中…";
  try{
    // File を Blob として保存（IndexedDB は Blob を直接格納できる）
    const images = pending.map(f=>f.slice(0, f.size, f.type || "image/jpeg"));
    const rec = { id: uuid(), createdAt: Date.now(), images };
    await addRecord(rec);
    pending = [];
    toast("保存しました");
    show("list");
  }catch(err){
    console.error(err);
    toast("保存に失敗しました");
  }finally{
    saveBtn.textContent = "保存する";
    saveBtn.disabled = false;
  }
});

/* ============ 詳細 ============ */
async function openDetail(id){
  const rec = await getRecord(id);
  if(!rec){ toast("記録が見つかりません"); return; }
  show("detail");
  document.getElementById("detailDate").textContent =
    `${fmtDate(rec.createdAt)}  ${fmtTime(rec.createdAt)}　/　${rec.images.length}枚`;
  const wrap = document.getElementById("detailImgs");
  wrap.innerHTML = "";
  rec.images.forEach(blob=>{
    const img = document.createElement("img");
    img.className = "detail-img";
    img.src = objURL(blob);
    img.alt = "";
    wrap.appendChild(img);
  });
}

backBtn.addEventListener("click", ()=>show("list"));

/* ============ 起動 ============ */
openDB().then(()=>show("list")).catch(err=>{
  console.error(err);
  document.getElementById("listMain").innerHTML =
    `<div class="empty">この端末では保存機能を利用できません。<br>Safari のプライベートブラウズを解除して試してください。</div>`;
});
</script>
</body>
</html>
